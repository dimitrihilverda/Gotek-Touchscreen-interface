name: Build firmware & publish release

# Builds the Gotek_Touchscreen sketch with arduino-cli for every supported
# display variant on every pushed version tag (v*.*.*). The compiled .bin
# files are renamed with a variant prefix and attached to a single GitHub
# Release for the same tag (created if missing). Also supports manual
# re-runs on an existing tag via workflow_dispatch.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.9.0). Must already exist on the repo.'
        required: true
        default: 'v0.9.0'

permissions:
  contents: write   # needed to create / update the Release

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: jc3248
            label: "Guition JC3248W535C (ESP32-S3, 480x320 QSPI)"
            display_define: DISPLAY_JC3248
            fqbn: "esp32:esp32:esp32s3:PSRAM=opi,FlashSize=8M,PartitionScheme=default_8MB,USBMode=hwcdc,CDCOnBoot=cdc,MSCOnBoot=default,DFUOnBoot=default,UploadMode=cdc"
            extra_libs: ""
          - variant: waveshare
            label: "Waveshare ESP32-S3-Touch-LCD-2.8 (ESP32-S3, 320x240 SPI)"
            display_define: DISPLAY_WAVESHARE
            fqbn: "esp32:esp32:esp32s3:PSRAM=opi,FlashSize=8M,PartitionScheme=default_8MB,USBMode=hwcdc,CDCOnBoot=cdc,MSCOnBoot=default,DFUOnBoot=default,UploadMode=cdc"
            extra_libs: "LovyanGFX"

    env:
      SKETCH: "Gotek_Touchscreen"

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}
          fetch-depth: 0

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 board core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Arduino libraries
        run: |
          arduino-cli lib install "JPEGDEC" "PNGdec"
          if [ -n "${{ matrix.extra_libs }}" ]; then
            arduino-cli lib install ${{ matrix.extra_libs }}
          fi

      - name: Compile firmware (${{ matrix.variant }})
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --build-property "compiler.cpp.extra_flags=-DACTIVE_DISPLAY=${{ matrix.display_define }}" \
            --output-dir build \
            --warnings none \
            "${SKETCH}"
          ls -lah build

      - name: Locate boot_app0.bin
        id: bootapp0
        run: |
          # boot_app0.bin ships with the ESP32 Arduino core; same file across
          # all variants, but every matrix job needs to upload it once so the
          # action-gh-release step can attach it (idempotent on the release).
          BOOT_APP0=$(find "$HOME/.arduino15/packages/esp32" -name 'boot_app0.bin' -print -quit)
          if [ -z "${BOOT_APP0}" ]; then
            echo "::error::boot_app0.bin not found in installed ESP32 core"
            exit 1
          fi
          echo "path=${BOOT_APP0}" >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts (${{ matrix.variant }})
        run: |
          mkdir -p release
          V="${{ matrix.variant }}"
          cp "build/${SKETCH}.ino.bootloader.bin" "release/gotek-touchscreen-${V}-bootloader.bin"
          cp "build/${SKETCH}.ino.partitions.bin" "release/gotek-touchscreen-${V}-partitions.bin"
          cp "build/${SKETCH}.ino.bin"            "release/gotek-touchscreen-${V}.bin"
          cp "${{ steps.bootapp0.outputs.path }}" "release/boot_app0.bin"
          ls -lah release

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/gotek-touchscreen-${{ matrix.variant }}-bootloader.bin
            release/gotek-touchscreen-${{ matrix.variant }}-partitions.bin
            release/gotek-touchscreen-${{ matrix.variant }}.bin
            release/boot_app0.bin
